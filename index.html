<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Bot Files</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%238B1D20%22><path d=%22M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F4F1EA; color: #1a1a1a; font-family: 'EB Garamond', serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 40px 20px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 5px; }
        .logo-svg { width: 40px; fill: #8B1D20; margin-bottom: 8px; }
        h1 { font-family: 'IM Fell DW Pica', serif; font-size: 2.2rem; text-transform: uppercase; margin: 0; letter-spacing: 2px; color: #8B1D20; }
        .nav-container { margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; font-weight: 500; display: flex; justify-content: center; gap: 12px; font-style: italic; }
        .nav-container a, .nav-container span { color: #7F7A6D; text-decoration: none; }
        .nav-container .active { font-weight: 800; }
        .divider { width: 100%; max-width: 1000px; border-bottom: 1px solid #D9D4C7; margin: 25px 0 40px 0; }
        
        #input-container { width: 100%; max-width: 700px; text-align: center; }
        textarea { width: 100%; height: 120px; background: transparent; border: none; padding: 15px; font-family: 'EB Garamond', serif; font-size: 1.3rem; color: #1a1a1a; resize: none; box-sizing: border-box; outline: none; }
        .btn-main { margin-top: 25px; background: #8B1D20; color: #F4F1EA; border: none; padding: 12px 35px; font-family: 'IM Fell DW Pica', serif; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 25px; }
        
        #output-area { width: 100%; max-width: 750px; display: none; }
        #response-question { font-weight: 800; color: #8B1D20; font-size: 1.5rem; margin-bottom: 40px; text-align: center; line-height: 1.4; }
        
        /* The Polaroid Frame */
        .polaroid { background: white; padding: 15px 15px 60px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transform: rotate(-1.5deg); margin: 0 auto 50px auto; max-width: 450px; border: 1px solid #E5E1D8; display: none; }
        .polaroid img { width: 100%; height: auto; display: block; filter: sepia(0.2) contrast(1.05); background: #eee; min-height: 300px; }
        
        #response-counsel { font-size: 1.3rem; line-height: 1.8; white-space: pre-wrap; color: #1a1a1a; text-align: justify; }
        .action-footer { text-align: center; margin-top: 60px; display: none; }
        footer { margin-top: 100px; text-align: center; font-size: 0.9rem; color: #A9A497; border-top: 1px solid #D9D4C7; padding: 40px 0; font-style: italic; line-height: 1.6; max-width: 800px; width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <svg class="logo-svg" viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z"/></svg>
        <h1>The Red Bot Files</h1>
    </div>
    <nav class="nav-container">
        <span class="active">Ask me Anything</span>
        <span style="opacity:0.5; font-style:normal;">/</span>
        <a href="cloud.html">Look Yonder</a>
    </nav>
    <div class="divider"></div>

    <div id="input-container">
        <textarea id="user-input" placeholder="write your question here"></textarea><br>
        <button class="btn-main" onclick="askQuestion()">Submit</button>
    </div>

    <div id="output-area">
        <div id="response-question"></div>
        <div id="response-image" class="polaroid"></div>
        <div id="response-counsel"></div>
        <div class="action-footer" id="action-footer">
            <button class="btn-main" onclick="location.reload()">New Inquiry</button>
        </div>
    </div>

    <footer>
        This fan-made experiment in artificial intelligence is part tribute and part parody, created to honor the creative genius of Nick Cave and his writings for <a href="https://www.theredhandfiles.com/" target="_blank">The Red Hand Files</a>.
    </footer>

    <script>
        const TypewriterAudio = {
            ctx: null,
            init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playClick() {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140 + Math.random() * 80, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.08);
            }
        };

        async function askQuestion() {
            const input = document.getElementById('user-input');
            const questionText = input.value.trim();
            if (!questionText) return;

            document.getElementById('input-container').style.display = 'none';
            document.getElementById('output-area').style.display = 'block';
            document.getElementById('response-question').innerText = questionText;
            document.getElementById('response-counsel').innerText = "Reading...";
            document.getElementById('response-image').style.display = 'none';
            
            const seed = Math.floor(Math.random() * 1000);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: questionText })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "", nounFound = false, buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(dataStr);
                                const content = parsed.choices[0].delta.content || "";
                                if (!content) continue;
                                
                                fullText += content;

                                if (document.getElementById('response-counsel').innerText === "Reading...") {
                                    document.getElementById('response-counsel').innerText = "";
                                }

                                // Precise Noun Extraction: must follow the format "NOUN: word"
                                if (!nounFound && fullText.toUpperCase().includes('NOUN:')) {
                                    const match = fullText.match(/NOUN:\s*([a-zA-Z]+)/i);
                                    if (match && match[1]) {
                                        const noun = match[1].toLowerCase().trim();
                                        // Simple, robust Pollinations URL
                                        const imgUrl = `https://pollinations.ai/p/${noun}?width=800&height=800&nologo=true&seed=${seed}`;
                                        document.getElementById('response-image').innerHTML = `<img src="${imgUrl}">`;
                                        document.getElementById('response-image').style.display = 'block';
                                        nounFound = true;
                                    }
                                }

                                // Display logic: Hide the NOUN trigger line from the counsel
                                const linesOfText = fullText.split('\n');
                                if (linesOfText.length > 1) {
                                    document.getElementById('response-counsel').innerText = linesOfText.slice(1).join('\n').trim();
                                }
                                
                                if (fullText.length % 5 === 0) TypewriterAudio.playClick();
                                
                            } catch (e) { }
                        }
                    }
                }
                document.getElementById('action-footer').style.display = 'block';

            } catch (err) {
                document.getElementById('response-counsel').innerHTML = `<span style="color:red;">The archive is silent: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
