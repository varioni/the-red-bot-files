<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Bot Files</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%238B1D20%22><path d=%22M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F4F1EA; color: #1a1a1a; font-family: 'EB Garamond', serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 40px 20px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 5px; }
        .logo-svg { width: 40px; fill: #8B1D20; margin-bottom: 8px; }
        h1 { font-family: 'IM Fell DW Pica', serif; font-size: 2.2rem; text-transform: uppercase; margin: 0; letter-spacing: 2px; color: #8B1D20; }
        
        /* Navigation - Dark Grey */
        .nav-container { margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; font-weight: 500; display: flex; justify-content: center; gap: 12px; font-style: italic; }
        .nav-container a, .nav-container span { color: #7F7A6D; text-decoration: none; }
        .nav-container .active { font-weight: 800; }

        .divider { width: 100%; max-width: 1000px; border-bottom: 1px solid #D9D4C7; margin: 25px 0 40px 0; }
        
        #input-container { width: 100%; max-width: 700px; text-align: center; }
        /* Borderless User Input */
        textarea { width: 100%; height: 120px; background: transparent; border: none; padding: 15px; font-family: 'EB Garamond', serif; font-size: 1.3rem; color: #1a1a1a; resize: none; box-sizing: border-box; outline: none; }
        
        /* Submit Button */
        button { margin-top: 25px; background: #8B1D20; color: #F4F1EA; border: none; padding: 12px 35px; font-family: 'IM Fell DW Pica', serif; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 25px; }
        
        #output-area { width: 100%; max-width: 750px; display: none; }
        #response-image { width: 100%; margin-bottom: 30px; border-radius: 4px; overflow: hidden; }
        #response-image img { width: 100%; height: auto; display: block; filter: sepia(0.1); }
        #response-counsel { font-size: 1.3rem; line-height: 1.7; white-space: pre-wrap; color: #1a1a1a; }

        footer { margin-top: 80px; text-align: center; font-size: 0.9rem; color: #A9A497; border-top: 1px solid #D9D4C7; padding: 40px 0; font-style: italic; line-height: 1.6; max-width: 800px; width: 100%; }
        footer a { color: #A9A497; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <svg class="logo-svg" viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z"/></svg>
        <h1>The Red Bot Files</h1>
    </div>
    <nav class="nav-container">
        <span class="active">Ask me Anything</span>
        <span style="opacity:0.5; font-style:normal;">/</span>
        <a href="cloud.html">Look Yonder</a>
    </nav>
    <div class="divider"></div>

    <div id="input-container">
        <textarea id="user-input" placeholder="write your question here"></textarea><br>
        <button onclick="askQuestion()">Submit</button>
    </div>

    <div id="output-area">
        <div id="response-image"></div>
        <div id="response-counsel"></div>
    </div>

    <footer>
        This fan-made experiment in artificial intelligence is part tribute and part parody, created to honor the creative genius of Nick Cave and his writings for <a href="https://www.theredhandfiles.com/" target="_blank">The Red Hand Files</a>.
        <br><br>
        Made with ❤ by <a href="https://github.com/varioni" target="_blank">varioni</a>
    </footer>

    <script>
        const TypewriterAudio = {
            ctx: null,
            init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playClick() {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140 + Math.random() * 80, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.08);
            }
        };

        async function askQuestion() {
            const input = document.getElementById('user-input');
            const question = input.value;
            if (!question) return;

            const counselDisplay = document.getElementById('response-counsel');
            const imageDisplay = document.getElementById('response-image');
            const inputContainer = document.getElementById('input-container');
            const outputArea = document.getElementById('output-area');

            inputContainer.style.display = 'none';
            outputArea.style.display = 'block';
            counselDisplay.innerText = "Reading...";
            
            const seed = Math.floor(Math.random() * 1000);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `Server returned ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";
                let nounFound = false;
                let charCount = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(dataStr);
                                const content = parsed.choices[0].delta.content || "";
                                fullText += content;

                                // Improved Noun Detection
                                if (!nounFound && (fullText.includes('\n') || fullText.length > 50)) {
                                    const parts = fullText.split('\n');
                                    if (parts[0].includes('NOUN:')) {
                                        const noun = parts[0].split('NOUN:')[1].trim().toLowerCase().replace(/[^a-z]/g, "");
                                        imageDisplay.innerHTML = `<img src="https://pollinations.ai/p/${noun}?width=800&height=500&seed=${seed}&model=flux&nologo=true">`;
                                        nounFound = true;
                                        counselDisplay.innerText = "";
                                    }
                                }

                                if (nounFound) {
                                    const counsel = fullText.split('\n').slice(1).join('\n').trim();
                                    counselDisplay.innerText = counsel;
                                    charCount++;
                                    if (charCount % 4 === 0) TypewriterAudio.playClick();
                                }
                            } catch (e) { 
                                // Fragmented JSON - wait for next chunk
                            }
                        }
                    }
                }
                
                if (!nounFound) {
                    throw new Error("AI failed to provide a NOUN for the image.");
                }

            } catch (err) {
                console.error(err);
                counselDisplay.innerHTML = `<span style="color:red;">Error: ${err.message}</span><br><br>Please refresh and try again.`;
            }
        }
    </script>
</body>
</html>
