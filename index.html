<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Bot Files | Ask me Anything</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%238B1D20%22><path d=%22M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #F4F1EA; --ink: #1a1a1a; --blood: #8B1D20; --dust: #A9A497; }
        body { background-color: var(--paper); color: var(--ink); font-family: 'EB Garamond', serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 40px 20px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 5px; }
        .logo-svg { width: 40px; fill: var(--blood); margin-bottom: 8px; }
        h1 { font-family: 'IM Fell DW Pica', serif; font-size: 2.2rem; text-transform: uppercase; margin: 0; letter-spacing: 2px; color: var(--blood); }
        .nav-container { margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; font-weight: 500; display: flex; gap: 12px; font-style: italic; }
        .nav-container a { color: var(--blood); text-decoration: none; }
        .nav-container .active { font-weight: 800; }
        .divider { width: 100%; max-width: 1000px; border-bottom: 1px solid #D9D4C7; margin: 25px 0 40px 0; }
        .input-group { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        textarea { width: 100%; height: 120px; padding: 15px; background: transparent; border: none; font-family: 'EB Garamond', serif; font-size: 1.2rem; resize: none; box-sizing: border-box; text-align: center; }
        textarea:focus { outline: none; }
        .btn { padding: 8px 35px; background: transparent; border: 1px solid #D9D4C7; color: var(--blood); font-family: 'EB Garamond', serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; cursor: pointer; transition: all 0.3s; width: fit-content; }
        .btn:hover { border-color: var(--blood); }
        #result-area { width: 100%; max-width: 900px; display: none; flex-direction: column; align-items: center; margin-top: 40px; }
        .question-echo { color: var(--blood); font-weight: bold; font-size: 1.3rem; text-align: center; margin-bottom: 40px; max-width: 800px; line-height: 1.3; }
        .result-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px; width: 100%; }
        .polaroid-frame { background: white; padding: 15px 15px 60px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transform: rotate(-2deg); height: fit-content; }
        .polaroid-frame img { width: 100%; height: auto; filter: sepia(0.2) contrast(1.1); display: block; }
        .answer-text { line-height: 1.6; font-size: 1.2rem; white-space: pre-wrap; color: var(--ink); }
        #share-container { margin-top: 50px; width: 100%; display: flex; justify-content: center; }
        .footer { margin-top: auto; text-align: center; font-size: 0.9rem; color: var(--dust); border-top: 1px solid #D9D4C7; padding: 40px 0; font-style: italic; max-width: 800px; width: 100%; line-height: 1.6; }
        .footer a { color: var(--dust); text-decoration: underline; }
        .footer .attribution { color: var(--blood); margin-top: 8px; display: block; font-weight: 500; }
        @media (max-width: 768px) { .result-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <svg class="logo-svg" viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z"/></svg>
        <h1>The Red Bot Files</h1>
    </div>
    <nav class="nav-container">
        <span class="active">Ask me Anything</span>
        <span style="opacity: 0.3">/</span>
        <a href="/cloud.html">Look Yonder</a>
    </nav>
    <div class="divider"></div>
    <div class="input-group">
        <textarea id="question-input" placeholder="Write your letter here..."></textarea>
        <button id="send-btn" class="btn" onclick="askTheArchive()">Submit</button>
    </div>
    <div id="result-area">
        <div id="echo-text" class="question-echo"></div>
        <div class="result-content">
            <div class="polaroid-frame">
                <img id="polaroid-img" src="" alt="Artifact">
            </div>
            <div class="answer-text" id="answer-text"></div>
        </div>
        <div id="share-container"></div>
    </div>
    <div class="footer">
        This fan-made experiment in artificial intelligence is part tribute and part parody, created to honor the creative genius of Nick Cave and his writings for <a href="https://www.theredhandfiles.com/" target="_blank">The Red Hand Files</a>.
        <span class="attribution">Made with ❤ by <a href="https://github.com/varioni" target="_blank">varioni</a></span>
    </div>
    <script>
        async function askTheArchive() {
            const input = document.getElementById('question-input');
            const btn = document.getElementById('send-btn');
            const question = input.value.trim();
            if (!question) return;
            input.disabled = true; btn.disabled = true; btn.innerText = "Listening...";
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await response.json();
                document.getElementById('echo-text').innerText = question;
                document.getElementById('answer-text').innerText = data.answer;
                document.getElementById('polaroid-img').src = `https://loremflickr.com/400/400/${data.noun},nature,architecture/all?lock=${data.seed}`;
                document.getElementById('result-area').style.display = 'flex';
                if (data.shareId) {
                    const shareUrl = `${window.location.origin}/share.html?id=${data.shareId}`;
                    document.getElementById('share-container').innerHTML = `<button onclick="copyLink('${shareUrl}')" class="btn">Copy Share Link</button>`;
                }
                window.scrollTo({ top: document.getElementById('result-area').offsetTop - 50, behavior: 'smooth' });
            } catch (err) {
                alert("The archive is silent.");
            } finally { input.disabled = false; btn.disabled = false; btn.innerText = "Submit"; }
        }
        function copyLink(url) { navigator.clipboard.writeText(url).then(() => alert("Link copied to clipboard.")); }
    </script>
</body>
</html>
