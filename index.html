<script>
    let shareId = "";

    async function askQuestion() {
        const input = document.getElementById('user-input');
        const qText = input.value.trim();
        if (!qText) return;

        document.getElementById('input-container').style.display = 'none';
        document.getElementById('output-area').style.display = 'block';
        document.getElementById('response-question').innerText = qText;
        document.getElementById('response-counsel').innerText = "Reading...";
        
        try {
            const response = await fetch('/api/chat', { method: 'POST', body: JSON.stringify({ question: qText }) });
            
            // DIAGNOSTIC 1: Check Headers
            shareId = response.headers.get("x-share-id");
            const seed = response.headers.get("x-seed");
            console.log("DIAGNOSTIC: ID caught:", shareId);
            console.log("DIAGNOSTIC: Seed caught:", seed);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "", nounFound = false, buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); 
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6).trim();
                        if (dataStr === '[DONE]') break;
                        
                        try {
                            const content = JSON.parse(dataStr).choices[0].delta.content || "";
                            if (content) fullText += content;

                            // DIAGNOSTIC 2: Check Noun Detection
                            if (!nounFound && fullText.includes('\n')) {
                                console.log("DIAGNOSTIC: Searching for NOUN in text...");
                                const match = fullText.match(/NOUN:\s*([a-zA-Z\-]+)/i);
                                
                                if (match && match[1]) {
                                    const noun = match[1].toLowerCase().trim();
                                    console.log("DIAGNOSTIC: Found Noun:", noun);
                                    
                                    const imgUrl = `https://loremflickr.com/400/400/${noun},gothic/all?lock=${seed}`;
                                    console.log("DIAGNOSTIC: Loading Image URL:", imgUrl);

                                    document.getElementById('polaroid-wrapper').style.display = 'block';
                                    document.getElementById('polaroid-wrapper').style.opacity = '1';
                                    
                                    const img = new Image();
                                    img.onload = () => {
                                        console.log("DIAGNOSTIC: Image Loaded Successfully.");
                                        document.getElementById('polaroid-frame').innerHTML = `<img src="${imgUrl}">`;
                                    };
                                    img.onerror = (e) => {
                                        console.error("DIAGNOSTIC: Image Failed to Load.", e);
                                    };
                                    img.src = imgUrl;
                                    nounFound = true;
                                }
                            }

                            if (nounFound) {
                                if (document.getElementById('response-counsel').innerText === "Reading...") {
                                    document.getElementById('response-counsel').innerText = "";
                                }
                                const clean = fullText.replace(/^.*NOUN:\s*.*?\n/im, "").trim();
                                if (clean) document.getElementById('response-counsel').innerText = clean;
                            }
                        } catch (e) { }
                    }
                }
            }
            document.getElementById('action-footer').style.display = 'block';
        } catch (err) { 
            console.error("DIAGNOSTIC: General Fetch Error:", err);
            document.getElementById('response-counsel').innerText = "Error: " + err.message; 
        }
    }
</script>
