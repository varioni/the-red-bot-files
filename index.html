<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Bot Files</title>
    <style>
        body {
            background-color: #000;
            color: #f4f4f4;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        #chat-box {
            margin-top: 30px;
            text-align: left;
            min-height: 200px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            font-family: inherit;
            font-size: 1.1rem;
            margin-bottom: 20px;
            outline: none;
            resize: none;
        }

        button {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 10px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            color: white;
            border-color: white;
        }

        .response {
            margin-top: 40px;
            font-style: italic;
            color: #ccc;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>The Red Bot Files</h1>
    <textarea id="question" rows="4" placeholder="Ask me a question..."></textarea>
    <br>
    <button onclick="askBot()">Submit</button>
    <div id="chat-box" class="response"></div>
</div>

<script>
    async function askBot() {
        const question = document.getElementById('question').value;
        const chatBox = document.getElementById('chat-box');
        
        chatBox.innerText = "Reflecting...";
        
        const response = await fetch('/api/chat', {
            method: 'POST',
            body: JSON.stringify({ question })
        });
        
        const data = await response.json();
        chatBox.innerText = data.answer;
    }
</script>

</body>
</html>
