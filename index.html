<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Bot Files</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #F4F1EA;
            color: #8B1D20;
            font-family: 'EB Garamond', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 80px 20px;
            letter-spacing: 0.5px;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        /* The Red Bot Hand Logo (SVG) */
        .logo-svg {
            width: 60px;
            height: auto;
            margin-bottom: 20px;
            fill: #8B1D20; /* Matching the deep red theme */
        }

        h1 {
            font-family: 'IM Fell DW Pica', serif;
            font-size: 2.8rem;
            text-transform: uppercase;
            margin: 10px 0;
            font-weight: normal;
            letter-spacing: 4px;
        }

        /* The horizontal divider line found in the original */
        .divider {
            width: 100%;
            max-width: 800px;
            border-bottom: 1px solid #D9D4C7;
            margin-bottom: 60px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #D9D4C7;
            font-family: 'EB Garamond', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: #222;
            padding: 15px 0;
            margin-bottom: 30px;
            outline: none;
            resize: none;
        }

        textarea::placeholder {
            color: #C4A79A;
        }

        button {
            background: transparent;
            color: #8B1D20;
            border: 1px solid #8B1D20;
            padding: 10px 35px;
            font-family: 'EB Garamond', serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        button:hover {
            background: #8B1D20;
            color: #F4F1EA;
        }

        .response {
            margin-top: 80px;
            font-size: 1.3rem;
            line-height: 1.9;
            color: #111;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21,12.5V10c0-0.55-0.45-1-1-1s-1,0.45-1,1v2h-1V7c0-0.55-0.45-1-1-1s-1,0.45-1,1v5h-1V5c0-0.55-0.45-1-1-1s-1,0.45-1,1v7h-1V6c0-0.55-0.45-1-1-1s-1,0.45-1,1v9.38c-0.89-0.34-1.87-0.12-2.54,0.54L8,16.5l3.81,3.81C12.19,20.69,12.7,21,13.24,21H19c1.1,0,2-0.9,2-2v-6.5z M4,9c0,0.55,0.45,1,1,1h2v2H5c-0.55,0-1,0.45-1,1s0.45,1,1,1h2v2H5c-0.55,0-1,0.45-1,1s0.45,1,1,1h3c1.1,0,2-0.9,2-2V8c0-1.1-0.9-2-2-2H5C4.45,6,4,6.45,4,7S4.45,8,4,8v1z"/>
        </svg>
        <h1>The Red Bot Files</h1>
    </div>

    <div class="divider"></div>

    <div class="container">
        <textarea id="question" rows="3" placeholder="Type your letter..."></textarea>
        <button onclick="askBot()">Submit</button>
        <div id="chat-box" class="response"></div>
    </div>

<script>
    async function askBot() {
        const question = document.getElementById('question').value;
        const chatBox = document.getElementById('chat-box');
        
        if (!question.trim()) return;

        chatBox.innerText = "...";
        
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            
            const data = await response.json();
            const cleanAnswer = data.answer.split("--- DEBUG:")[0];
            chatBox.innerText = cleanAnswer.trim();
            
            document.getElementById('question').value = '';
        } catch (error) {
            chatBox.innerText = "A silence has fallen over the archive. Please try again.";
        }
    }
</script>

</body>
</html>
