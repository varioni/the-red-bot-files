<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Bot Files</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%238B1D20%22><path d=%22M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F4F1EA; color: #8B1D20; font-family: 'EB Garamond', serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 60px 20px; }
        .header { text-align: center; margin-bottom: 60px; }
        .logo-svg { width: 60px; fill: #8B1D20; margin-bottom: 20px; }
        h1 { font-family: 'IM Fell DW Pica', serif; font-size: 2.5rem; text-transform: uppercase; margin: 0; }
        .divider { width: 100%; max-width: 800px; border-bottom: 1px solid #D9D4C7; margin: 40px 0; }
        .container { max-width: 900px; width: 100%; }
        textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid #D9D4C7; font-family: 'EB Garamond', serif; font-size: 1.3rem; font-style: italic; color: #444; padding: 10px 0; outline: none; resize: none; }
        button { background: transparent; color: #8B1D20; border: 1px solid #8B1D20; padding: 10px 30px; margin-top: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #8B1D20; color: #F4F1EA; }
        .user-question-display { font-weight: 700; font-size: 1.4rem; color: #8B1D20; text-align: center; margin-bottom: 40px; line-height: 1.4; white-space: pre-wrap; }
        .content-wrapper { display: grid; grid-template-columns: 350px 1fr; gap: 50px; margin-top: 20px; align-items: flex-start; }
        .polaroid { background: #fff; padding: 15px 15px 60px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transform: rotate(-1.5deg); display: none; }
        .polaroid img { width: 100%; height: 320px; object-fit: cover; filter: sepia(0.3) contrast(1.1) brightness(0.9) grayscale(0.2); }
        .response { font-size: 1.2rem; line-height: 1.8; color: #111; white-space: pre-wrap; }
        .footer { margin-top: 100px; text-align: center; font-size: 0.85rem; color: #A9A497; line-height: 1.6; max-width: 600px; border-top: 1px solid #D9D4C7; padding-top: 40px; font-style: italic; }
        .credit { display: block; margin-top: 15px; font-style: normal; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; color: #8B1D20; }
        @media (max-width: 800px) { .content-wrapper { grid-template-columns: 1fr; } .polaroid { margin: 0 auto 40px; } }
    </style>
</head>
<body>
    <div class="header">
        <svg class="logo-svg" viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z"/></svg>
        <h1>The Red Bot Files</h1>
    </div>
    <div class="divider"></div>
    <div class="container">
        <textarea id="question-input" rows="2" placeholder="Write your letter here..."></textarea>
        <div style="text-align: center;"><button onclick="askBot()">Submit</button></div>
        <div id="output-area" style="margin-top: 60px;">
            <div id="display-question" class="user-question-display"></div>
            <div class="content-wrapper">
                <div id="photo-frame" class="polaroid"><img id="photo-img" src=""></div>
                <div id="chat-box" class="response"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        This fan-made experiment in artificial intelligence is part tribute and part parody, created to honor the creative genius of Nick Cave and his writings for <a href="https://www.theredhandfiles.com" target="_blank" style="color: inherit;">The Red Hand Files</a>.
        <span class="credit">Made with ❤️ by varioni</span>
    </div>

<script>
    async function askBot() {
        const input = document.getElementById('question-input');
        const displayQuestion = document.getElementById('display-question');
        const chatBox = document.getElementById('chat-box');
        const photoFrame = document.getElementById('photo-frame');
        const photoImg = document.getElementById('photo-img');
        const qText = input.value.trim();
        if (!qText) return;

        displayQuestion.innerText = qText;
        chatBox.innerText = "...";
        photoFrame.style.display = 'none';
        input.value = '';

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: qText })
            });
            const data = await res.json();
            chatBox.innerText = data.answer;

            if (data.imageTheme) {
                // FIXED CACHE BUSTER AND DIRECT KEYWORD SEARCH
                const timestamp = new Date().getTime();
                const query = encodeURIComponent(data.imageTheme);
                photoImg.src = `https://source.unsplash.com/featured/400x400/?${query},dark,moody&sig=${timestamp}`;
                photoImg.onload = () => { photoFrame.style.display = 'block'; };
            }
        } catch (e) { chatBox.innerText = "The archive is silent."; }
    }
</script>
</body>
</html>
