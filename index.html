<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Bot Files</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap?v=2" rel="stylesheet">
    <style>
        body {
            background-color: #F4F1EA !important; /* Creamy paper color */
            color: #8B1D20 !important; /* Deep red text */
            font-family: 'EB Garamond', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 50px 20px;
            letter-spacing: 0.5px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        /* Our "Bot Hand" Logo */
        .logo {
            width: 80px;
            filter: sepia(1) saturate(5) hue-rotate(-50deg); /* Makes the emoji look like a red stamp */
            font-size: 60px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-family: 'IM Fell DW Pica', serif;
            font-size: 2.8rem;
            text-transform: uppercase;
            margin: 10px 0;
            font-weight: normal;
        }

        .nav {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid #D9D4C7;
            padding-bottom: 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 50px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #D9D4C7;
            font-family: 'EB Garamond', serif;
            font-size: 1.3rem;
            font-style: italic;
            color: #222; /* Question text is darker for contrast */
            padding: 10px 0;
            margin-bottom: 20px;
            outline: none;
            resize: none;
        }

        button {
            background: transparent;
            color: #8B1D20;
            border: 1px solid #8B1D20;
            padding: 8px 25px;
            font-family: 'EB Garamond', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #8B1D20;
            color: #F4F1EA;
        }

        .response {
            margin-top: 60px;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #222;
            white-space: pre-wrap;
        }

        /* Small debug text at bottom */
        .debug-footer {
            margin-top: 100px;
            font-size: 0.7rem;
            color: #A9A497;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">🦾</span>
        <h1>The Red Bot Files</h1>
    </div>

    <div class="nav">
        THE FILES &nbsp; / &nbsp; ABOUT &nbsp; / &nbsp; ASK A QUESTION
    </div>

    <div class="container">
        <textarea id="question" rows="3" placeholder="Write your question here..."></textarea>
        <button onclick="askBot()">Submit</button>
        <div id="chat-box" class="response"></div>
        <div id="debug" class="debug-footer"></div>
    </div>

<script>
    async function askBot() {
        const question = document.getElementById('question').value;
        const chatBox = document.getElementById('chat-box');
        const debug = document.getElementById('debug');
        
        chatBox.innerText = "...";
        
        const response = await fetch('/api/chat', {
            method: 'POST',
            body: JSON.stringify({ question })
        });
        
        const data = await response.json();
        
        // Split the answer and the debug info
        const parts = data.answer.split("--- DEBUG:");
        chatBox.innerText = parts[0];
        if (parts[1]) debug.innerText = "Archive Status: " + parts[1];
        
        document.getElementById('question').value = '';
    }
</script>

</body>
</html>
