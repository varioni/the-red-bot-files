<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Themes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f4f1ea;
            color: #2c2c2c;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dcdcdc;
        }
        .logo {
            width: 40px; /* Locked at 40px */
            height: auto;
        }
        nav a {
            text-decoration: none;
            color: #2c2c2c;
            margin-left: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        main {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        #cloud-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .word {
            transition: transform 0.2s;
            cursor: default;
        }
        .word:hover {
            transform: scale(1.1);
            color: #000;
        }
        footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 0.75rem;
            line-height: 1.6;
            color: #777;
            border-top: 1px solid #dcdcdc;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="logo.png" alt="Logo" class="logo">
        </a>
        <nav>
            <a href="index.html">INQUIRY</a>
            <a href="cloud.html">THEMES</a>
        </nav>
    </header>

    <main>
        <h1>Thematic Resonance</h1>
        <div id="cloud-container">
            </div>
    </main>

    <footer>
        <p>This fan-made experiment in artificial intelligence is part tribute and part parody, created to honor the creative genius of Nick Cave and his writings for The Red Hand Files.</p>
    </footer>

    <script>
        async function fetchCloud() {
            const container = document.getElementById('cloud-container');
            try {
                const response = await fetch('/api/wordcloud');
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                container.innerHTML = data.map(item => `
                    <span class="word" style="font-size: ${item.size}px; opacity: ${Math.max(0.4, item.size / 100)};">
                        ${item.text}
                    </span>
                `).join('');

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="font-style: italic; color: #999;">The archive is currently overwhelmed by shadows.</p>';
            }
        }
        fetchCloud();
    </script>
</body>
</html>
