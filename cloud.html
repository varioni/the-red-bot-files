<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Look Yonder! A Big Bot Cloud Come</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F4F1EA; color: #8B1D20; font-family: 'EB Garamond', serif; text-align: center; padding: 50px; }
        h1 { font-family: 'IM Fell DW Pica', serif; text-transform: uppercase; letter-spacing: 3px; }
        #cloud { max-width: 800px; margin: 40px auto; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; }
        .word { transition: all 0.3s ease; cursor: default; }
        .word:hover { color: #000; transform: scale(1.1); }
        .back-link { margin-top: 50px; display: block; color: #8B1D20; text-decoration: none; font-style: italic; }
    </style>
</head>
<body>
    <h1>Look Yonder! A big bot cloud come!</h1>
    <p>Common themes found within the letters sent to The Red Bot Files.</p>
    
    <div id="cloud">Loading words from the deep...</div>

    <a href="/" class="back-link">← Return to the Letter</a>

    <script>
        async function loadCloud() {
            try {
                const res = await fetch('/api/wordcloud');
                const words = await res.json();
                const container = document.getElementById('cloud');
                container.innerHTML = '';

                words.forEach(word => {
                    const el = document.createElement('span');
                    el.className = 'word';
                    el.innerText = word.text;
                    el.style.fontSize = word.size + 'px';
                    el.style.opacity = Math.min(1, 0.3 + (word.size / 50));
                    container.appendChild(el);
                });
            } catch (e) {
                document.getElementById('cloud').innerText = "The archive is silent.";
            }
        }
        loadCloud();
    </script>
</body>
</html>
