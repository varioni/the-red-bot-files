<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Straight to You | The Red Bot Files</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%238B1D20%22><path d=%22M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Nothing+You+Could+Do&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #F4F1EA; --ink: #1a1a1a; --blood: #8B1D20; --dust: #A9A497; }
        body { background-color: var(--paper); color: var(--ink); font-family: 'EB Garamond', serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 40px 20px; min-height: 100vh; }
        
        .header { text-align: center; margin-bottom: 60px; }
        /* Logo width maintained at 40px */
        .logo-svg { width: 40px; fill: var(--blood); margin-bottom: 8px; }
        h1 { font-family: 'IM Fell DW Pica', serif; text-transform: uppercase; color: var(--blood); margin: 0; letter-spacing: 2px; }
        .subtitle { font-style: italic; color: var(--dust); margin-top: 10px; font-size: 1.1rem; }

        #content { width: 100%; max-width: 900px; display: none; flex-direction: column; align-items: center; }
        .question-echo { color: var(--blood); font-weight: bold; font-size: 1.3rem; text-align: center; margin-bottom: 40px; max-width: 800px; line-height: 1.3; }
        
        .result-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px; width: 100%; }
        
        /* Polaroid Styling */
        .polaroid-frame { 
            background: white; 
            padding: 15px 15px 15px 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            transform: rotate(-2deg); 
            height: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .polaroid-frame img { width: 100%; height: auto; filter: sepia(0.2) contrast(1.1); display: block; }
        
        /* The Noun Container */
        .polaroid-caption {
            margin-top: 15px;
            margin-bottom: 5px;
            font-family: 'Nothing You Could Do', cursive;
            font-size: 1.4rem;
            color: #333;
            text-transform: capitalize;
        }

        .answer-text { line-height: 1.6; font-size: 1.25rem; white-space: pre-wrap; color: var(--ink); }

        .btn { margin-top: 60px; padding: 8px 25px; background: transparent; border: 1px solid var(--blood); color: var(--blood); font-family: 'EB Garamond', serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; text-decoration: none; transition: all 0.3s; }
        .btn:hover { background: var(--blood); color: var(--paper); }

        .footer { margin-top: auto; text-align: center; font-size: 0.9rem; color: var(--dust); border-top: 1px solid #D9D4C7; padding: 40px 0; font-style: italic; max-width: 800px; width: 100%; line-height: 1.6; }
        .footer a { color: var(--dust); text-decoration: underline; }
        .footer .attribution { color: var(--blood); margin-top: 8px; display: block; }
        .footer .attribution a { color: var(--blood); }

        @media (max-width: 768px) { .result-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <svg class="logo-svg" viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm6 9a5 5 0 0 0-10 0v6h10v-6zm-7 2.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM9 18h6v1.5H9V18z"/></svg>
        <h1>The Red Bot Files</h1>
        <div class="subtitle">Straight to You - the AI captured</div>
    </div>

    <div id="content">
        <div id="shared-question" class="question-echo"></div>
        <div class="result-content">
            <div class="polaroid-frame">
                <img id="shared-img" src="" alt="Artifact">
                <!-- Noun now loads here -->
                <div id="shared-noun" class="polaroid-caption"></div>
            </div>
            <div id="shared-answer" class="answer-text"></div>
        </div>
        <a href="/" class="btn">Ask your own question</a>
    </div>

    <div class="footer">
        This fan-made experiment in artificial intelligence is part tribute and part parody, created to honor the creative genius of Nick Cave and his writings for <a href="https://www.theredhandfiles.com/" target="_blank">The Red Hand Files</a>.
        <span class="attribution">Made with ❤ by <a href="https://github.com/varioni" target="_blank">varioni</a></span>
    </div>

    <script>
        async function loadSharedLetter() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            try {
                const res = await fetch(`/api/get-share?id=${id}`);
                const data = await res.json();
                
                if (data.answer) {
                    document.getElementById('shared-question').innerText = data.question;
                    document.getElementById('shared-answer').innerText = data.answer;
                    
                    // Populate the noun in the Polaroid frame
                    document.getElementById('shared-noun').innerText = data.noun || "Artifact";
                    
                    document.getElementById('shared-img').src = `https://loremflickr.com/400/400/${data.noun},gothic/all?lock=${data.seed}`;
                    document.getElementById('content').style.display = 'flex';
                }
            } catch (e) {
                document.body.innerHTML = "<h2 style='margin-top:100px; color:#8B1D20; text-align:center;'>This letter has faded from the archive.</h2>";
            }
        }
        loadSharedLetter();
    </script>
</body>
</html>
